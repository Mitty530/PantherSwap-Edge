apiVersion: v1
kind: Namespace
metadata:
  name: pantherswap-edge
  labels:
    name: pantherswap-edge
    environment: production
    app.kubernetes.io/name: pantherswap-edge
    app.kubernetes.io/version: "1.0.0"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pantherswap-edge-quota
  namespace: pantherswap-edge
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    services: "10"
    secrets: "20"
    configmaps: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: pantherswap-edge-limits
  namespace: pantherswap-edge
spec:
  limits:
  - default:
      cpu: "1"
      memory: "2Gi"
    defaultRequest:
      cpu: "500m"
      memory: "1Gi"
    type: Container
  - default:
      storage: "10Gi"
    type: PersistentVolumeClaim
