[package]
name = "pantherswap-edge-performance-test"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "standalone_performance_test"
path = "standalone_performance_test.rs"

[[bin]]
name = "rust_timescale_test"
path = "standalone_rust_db.rs"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
rand = "0.8"
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "postgres", "chrono", "uuid", "json"] }
