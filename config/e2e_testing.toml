# End-to-End Testing Configuration for PantherSwap Edge
# This configuration is optimized for comprehensive testing with real market data

[server]
host = "0.0.0.0"
port = 8080
workers = 8  # Increased for testing load

[database]
url = "postgres://tsdbadmin:sz2eu577bgqi5767@jqrbtbc5nw.w0mq2s13iy.tsdb.cloud.timescale.com:35762/tsdb?sslmode=require"
max_connections = 100  # Production-level connections
min_connections = 20
connection_timeout = 30
query_timeout = 5  # 5 second query timeout
idle_timeout = 300
max_lifetime = 1800
enable_real_time_monitoring = true
slow_query_threshold_ms = 500  # Stricter for testing
data_retention_days = 14
enable_performance_metrics = true
connection_pool_monitoring = true

[market_data]
providers = ["ig_trading"]
instruments = [
    # Forex pairs for high-frequency testing
    "EURUSD", "GBPUSD", "USDJPY", "AUDUSD", "USDCAD", "NZDUSD", "USDCHF", "EURJPY",
    # Major stocks for diverse testing
    "AAPL", "MSFT", "GOOGL", "TSLA", "NVDA", "AMZN", "META", "NFLX"
]
update_interval_ms = 5000  # 5 seconds for more frequent updates during testing
max_retries = 5
timeout_ms = 8000
quality_threshold = 0.8  # Higher quality threshold for testing

[market_data.ig_trading]
api_key = ""  # Set via IG_TRADING_API_KEY environment variable
username = ""  # Set via IG_TRADING_USERNAME environment variable
password = ""  # Set via IG_TRADING_PASSWORD environment variable
security_token = ""  # Set via IG_TRADING_SECURITY_TOKEN environment variable
cst = ""  # Set via IG_TRADING_CST environment variable
version = "2"
base_url = "https://demo-api.ig.com/gateway/deal"  # Demo environment for testing
content_type = "application/json; charset=UTF-8"
accept = "application/json; charset=UTF-8"
enable_streaming = true
max_positions = 200
max_order_value = 500000.0
rate_limit_per_minute = 100
connection_timeout_ms = 5000
retry_attempts = 3
enable_order_execution = true
demo_mode = true  # Use demo environment for testing

[trading]
enable_live_trading = true  # Enable for end-to-end testing
signal_generation_interval_ms = 500  # Faster signal generation
risk_check_interval_ms = 250  # More frequent risk checks
max_position_size = 10000.0  # Smaller positions for testing
confidence_threshold = 0.6  # Lower threshold for more trading activity
strategy_types = [
    "predictive_market_making",
    "microstructure_momentum", 
    "regime_arbitrage",
    "liquidity_harvesting",
    "ai_enhanced_momentum",
    "regime_switching_arbitrage"
]

[ai]
enable_predictions = true
model_path = "./models/"
model_update_interval_hours = 1  # More frequent updates for testing
prediction_horizons_minutes = [1, 5, 15, 30, 60]
enable_training = true  # Enable for comprehensive testing
training_batch_size = 128

[risk]
max_portfolio_var = 0.01  # 1% - stricter for testing
max_leverage = 2.0  # Lower leverage for testing
confidence_threshold = 0.6
max_daily_loss = 5000.0  # Lower for testing
drawdown_limit = 0.05  # 5% - stricter for testing

[api]
rate_limit_per_minute = 2000  # Higher for testing load
enable_cors = true
max_request_size = 2097152  # 2MB for testing
api_key_header = "X-API-Key"

# Testing-specific configurations
[testing]
enable_performance_monitoring = true
enable_latency_tracking = true
enable_throughput_measurement = true
enable_error_tracking = true
enable_competitive_benchmarking = true

# Performance targets for validation
[performance_targets]
max_order_execution_latency_ms = 10.0
max_ai_inference_latency_ms = 100.0
min_throughput_tps = 1000.0
min_uptime_percentage = 99.9
min_ai_accuracy_percentage = 90.0
min_test_coverage_percentage = 90.0

# Competitive benchmarking settings
[benchmarking]
enable_execution_speed_comparison = true
enable_accuracy_comparison = true
enable_risk_management_comparison = true
enable_profitability_comparison = true
benchmark_duration_minutes = 60
benchmark_instruments = ["EURUSD", "AAPL", "TSLA"]

# Test data generation settings
[test_data]
generate_synthetic_orders = true
synthetic_order_count = 10000
test_portfolio_size = 100000.0
test_scenarios = [
    "normal_market",
    "high_volatility", 
    "low_liquidity",
    "market_crash",
    "trending_market",
    "sideways_market"
]

debug = true  # Enable debug logging for testing
