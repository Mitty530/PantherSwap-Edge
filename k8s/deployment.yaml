apiVersion: apps/v1
kind: Deployment
metadata:
  name: pantherswap-edge
  namespace: pantherswap-edge
  labels:
    app.kubernetes.io/name: pantherswap-edge
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: pantherswap-edge
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pantherswap-edge
        app.kubernetes.io/component: api
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: pantherswap-edge
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
      - name: pantherswap-edge
        image: pantherswap-edge:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: RUN_MODE
          value: "production"
        - name: PANTHERSWAP_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: pantherswap-edge-secrets
              key: database-url
        - name: PANTHERSWAP_MARKET_DATA_ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: pantherswap-edge-secrets
              key: alpha-vantage-api-key
        - name: RUST_LOG
          value: "info,sqlx=warn,hyper=warn,tower_http=info"
        - name: PANTHERSWAP_SERVER_HOST
          value: "0.0.0.0"
        - name: PANTHERSWAP_SERVER_PORT
          value: "8080"
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: logs
          mountPath: /var/log/pantherswap-edge
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /health/liveness
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config
        configMap:
          name: pantherswap-edge-config
      - name: logs
        emptyDir: {}
      imagePullSecrets:
      - name: pantherswap-edge-registry
      nodeSelector:
        kubernetes.io/arch: amd64
      tolerations:
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - pantherswap-edge
              topologyKey: kubernetes.io/hostname
